<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secure Reverse Shell</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.3.0/css/xterm.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Monaco', 'Courier New', monospace;
      background: #1e1e1e;
      color: #d4d4d4;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #2d2d30;
      border-bottom: 1px solid #464647;
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-title {
      font-size: 14px;
      font-weight: 500;
      color: #4fc3f7;
    }

    .header-info {
      font-size: 12px;
      color: #858585;
      display: flex;
      gap: 16px;
    }

    .info-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .status-indicator {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
    }

    .status-connected {
      background: #4ec9b0;
    }

    .status-disconnected {
      background: #f48771;
    }

    .header-actions {
      display: flex;
      gap: 8px;
    }

    button {
      padding: 6px 12px;
      background: #007acc;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover {
      background: #005a9e;
    }

    button:disabled {
      background: #464647;
      color: #858585;
      cursor: not-allowed;
    }

    .terminal-container {
      flex: 1;
      overflow: hidden;
      position: relative;
      padding: 8px;
    }

    #terminal {
      width: 100%;
      height: 100%;
    }

    .xterm {
      width: 100%;
      height: 100%;
    }

    .xterm-viewport {
      background: #1e1e1e;
    }

    .xterm-screen {
      padding: 0;
    }

    footer {
      background: #2d2d30;
      border-top: 1px solid #464647;
      padding: 8px 16px;
      font-size: 11px;
      color: #858585;
      display: flex;
      justify-content: space-between;
    }

    .help-text {
      font-size: 11px;
      color: #858585;
    }

    .error {
      color: #f48771;
    }
  </style>
</head>
<body>
  <header>
    <div class="header-left">
      <span class="header-title">Secure Shell Terminal</span>
    </div>
    <div class="header-info">
      <div class="info-item">
        <span class="status-indicator status-disconnected" id="status-indicator"></span>
        <span id="status-text">disconnected</span>
      </div>
      <div class="info-item" id="session-info" style="display: none;">
        <span id="session-id"></span>
      </div>
      <div class="info-item" id="clients-info" style="display: none;">
        <span id="clients-count"></span>
      </div>
    </div>
    <div class="header-actions">
      <button id="connect-btn" onclick="connectToSession()">Connect</button>
      <button id="disconnect-btn" onclick="disconnectSession()" disabled>Disconnect</button>
    </div>
  </header>

  <div class="terminal-container">
    <div id="terminal"></div>
  </div>

  <footer>
    <div class="help-text">
      <span id="message"></span>
    </div>
    <div class="help-text">Type to interact with the shell. Both CLI and web terminal share the same session.</div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.3.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.9.0/lib/xterm-addon-fit.min.js"></script>
  <script src="/client.js"></script>
</body>
</html>
