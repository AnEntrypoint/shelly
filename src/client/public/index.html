<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Secure Reverse Shell</title>
  <link rel="stylesheet" href="/lib/xterm.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Monaco', 'Courier New', monospace;
      background: #1e1e1e;
      color: #d4d4d4;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #2d2d30;
      border-bottom: 1px solid #464647;
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-title {
      font-size: 14px;
      font-weight: 500;
      color: #4fc3f7;
    }

    .header-info {
      font-size: 12px;
      color: #858585;
      display: flex;
      gap: 16px;
    }

    .info-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .status-indicator {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
    }

    .status-connected {
      background: #4ec9b0;
    }

    .status-disconnected {
      background: #f48771;
    }

    .header-actions {
      display: flex;
      gap: 8px;
    }

    button {
      padding: 6px 12px;
      background: #007acc;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover {
      background: #005a9e;
    }

    button:disabled {
      background: #464647;
      color: #858585;
      cursor: not-allowed;
    }

    .terminal-container {
      flex: 1;
      overflow: hidden;
      position: relative;
      padding: 8px;
    }

    #terminal {
      width: 100%;
      height: 100%;
    }

    .xterm {
      width: 100%;
      height: 100%;
    }

    .xterm-viewport {
      background: #1e1e1e;
    }

    .xterm-screen {
      padding: 0;
    }

    footer {
      background: #2d2d30;
      border-top: 1px solid #464647;
      padding: 8px 16px;
      font-size: 11px;
      color: #858585;
      display: flex;
      justify-content: space-between;
    }

    .help-text {
      font-size: 11px;
      color: #858585;
    }

    .error {
      color: #f48771;
    }

    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.8);
      justify-content: center;
      align-items: center;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: #2d2d30;
      border: 1px solid #464647;
      border-radius: 6px;
      padding: 32px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
    }

    .modal-title {
      font-size: 18px;
      font-weight: 600;
      color: #4fc3f7;
      margin-bottom: 24px;
    }

    .modal-input {
      width: 100%;
      padding: 10px 12px;
      background: #1e1e1e;
      border: 1px solid #464647;
      border-radius: 4px;
      color: #d4d4d4;
      font-family: monospace;
      font-size: 13px;
      margin-bottom: 16px;
      box-sizing: border-box;
    }

    .modal-input:focus {
      outline: none;
      border-color: #569cd6;
    }

    .modal-button {
      width: 100%;
      padding: 10px 12px;
      background: #007acc;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .modal-button:hover {
      background: #005a9e;
    }

    .modal-button:disabled {
      background: #464647;
      color: #858585;
      cursor: not-allowed;
    }

    .sessions-list {
      max-height: 300px;
      overflow-y: auto;
      margin-top: 16px;
    }

    .session-item {
      background: #1e1e1e;
      border: 1px solid #464647;
      border-radius: 4px;
      padding: 12px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .session-item:hover {
      border-color: #569cd6;
    }

    .session-item-id {
      font-size: 12px;
      color: #4fc3f7;
      margin-bottom: 4px;
    }

    .session-item-info {
      font-size: 11px;
      color: #858585;
    }
  </style>
</head>
<body>
  <div id="password-modal" class="modal active">
    <div class="modal-content">
      <div class="modal-title">Enter Password</div>
      <input type="password" id="password-input" class="modal-input" placeholder="Session password" autocomplete="off" onkeypress="if(event.key==='Enter') handle_password_submit();">
      <button id="password-submit" class="modal-button" onclick="handle_password_submit()">Connect</button>
      <div id="sessions-list" class="sessions-list"></div>
      <div id="modal-message" style="font-size: 12px; color: #858585; margin-top: 12px; text-align: center;"></div>
    </div>
  </div>

  <header>
    <div class="header-left">
      <span class="header-title">Secure Shell Terminal</span>
    </div>
    <div class="header-info">
      <div class="info-item">
        <span class="status-indicator status-disconnected" id="status-indicator"></span>
        <span id="status-text">disconnected</span>
      </div>
      <div class="info-item" id="session-info" style="display: none;">
        <span id="session-id"></span>
      </div>
      <div class="info-item" id="clients-info" style="display: none;">
        <span id="clients-count"></span>
      </div>
    </div>
    <div class="header-actions">
      <button id="connect-btn" onclick="connectToSession()">Connect</button>
      <button id="disconnect-btn" onclick="disconnectSession()" disabled>Disconnect</button>
    </div>
  </header>

  <div class="terminal-container">
    <div id="terminal"></div>
  </div>

  <footer>
    <div class="help-text">
      <span id="message"></span>
    </div>
    <div class="help-text">Type to interact with the shell. Both CLI and web terminal share the same session.</div>
  </footer>

  <script src="/lib/xterm.js"></script>
  <script src="/lib/addon-fit.js"></script>
  <script src="/client.js"></script>
</body>
</html>
